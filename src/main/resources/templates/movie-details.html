<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${movie != null ? movie.title : 'Film non trouvé'} + ' - RocMovies'"></title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header th:insert="~{fragment :: header}"></header>

    <main>
        <h2>🎬 Détails du film</h2>

        <div th:if="${error}" class="alert alert-error">
            <span th:text="${error}">Erreur</span>
        </div>

        <div th:if="${movie != null}" class="movie-details">
            <h3 th:text="${movie.title}">Titre du film</h3>
            <div class="movie-info">
                <p><strong>🎭 Style:</strong> <span th:text="${movie.style.styleName}">Style du film</span></p>
                <p><strong>📅 Année de production:</strong> <span th:text="${movie.productionYear}">Année</span></p>
                <p><strong>🏷️ Référence:</strong> <span th:text="${movie.reference}">Référence</span></p>
                <p><strong>🎬 Producteur:</strong> <span th:text="${movie.productor.name}">Producteur</span></p>
            </div>
        </div>

        <a th:href="@{/home}" class="back-link">Retour à l'accueil</a>
    </main>

    <footer th:insert="~{fragment :: footer}"></footer>
</body>
</html>
